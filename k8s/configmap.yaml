# 非敏感配置。敏感项见 secret.yaml（不要提交真实值）
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: enterprise-rag
data:
  APP_NAME: "企业知识库RAG"
  LOG_LEVEL: "INFO"
  # 集群内服务地址（与各自 Service 名称一致；DATABASE_URL 在各容器 env 中拼装）
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "kb_chunks"
  LLM_BASE_URL: "https://api.openai.com/v1"
  LLM_MODEL: "gpt-4o"
  EMBEDDING_MODEL: "text-embedding-3-large"
  CHUNK_SIZE: "500"
  CHUNK_OVERLAP: "100"
  RETRIEVAL_TOP_K: "50"
  RERANK_TOP_K: "10"
  UPLOAD_DIR: "/app/uploads"
  MAX_FILE_SIZE_MB: "100"
  FRONTEND_URL: "https://rag.example.com"
  # SSO / OIDC（按需开启）
  OIDC_ENABLED: "false"
  OIDC_AUTHORIZE_URL: ""
  OIDC_TOKEN_URL: ""
  OIDC_USERINFO_URL: ""
  OIDC_REDIRECT_URI: "https://api.rag.example.com/api/v1/auth/sso/callback"
