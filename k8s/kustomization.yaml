# K8s 部署清单总入口（kubectl apply -k k8s/）
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: enterprise-rag

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - redis.yaml
  - qdrant.yaml
  - api.yaml
  - worker.yaml
  - frontend.yaml
  - ingress.yaml
