# 敏感配置模板 —— 部署前用真实值替换，切勿提交真实密钥
# 建议生产方式：kubectl create secret generic rag-secret --from-env-file=.env.k8s -n enterprise-rag
# 或接入 External Secrets / Sealed Secrets
apiVersion: v1
kind: Secret
metadata:
  name: rag-secret
  namespace: enterprise-rag
type: Opaque
stringData:
  POSTGRES_USER: "raguser"
  POSTGRES_PASSWORD: "CHANGE_ME"
  JWT_SECRET_KEY: "CHANGE_ME"
  LLM_API_KEY: "CHANGE_ME"
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
